<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Tickets — Soporte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body>

    <header class="site-header">
        <div class="header-inner">
            <div class="header-eyebrow">Proyecto IA - 2026</div>
            <h1 class="site-title">Sistema de Tickets de Soporte</h1>
            <p class="site-subtitle">Crea un ticket de soporte y el sistema clasificará automáticamente su categoría.
            </p>
        </div>
    </header>

    <main>

        <div class="card">

            <!-- Ticket ID -->
            <div class="form-row">
                <label for="ticket-id" class="field-label">ID de Ticket</label>
                <input type="text" id="ticket-id" class="input-readonly" readonly />
            </div>

            <div class="divider"></div>

            <!-- Subject -->
            <div class="form-row">
                <label for="subject" class="field-label">Asunto</label>
                <input type="text" id="subject" class="input-text" placeholder="Ej: Problem with my recent order"
                    maxlength="150" />
            </div>

            <!-- Description -->
            <div class="form-row">
                <label for="descripcion" class="field-label">
                    Descripción
                    <span class="field-hint">— Ctrl+Enter para clasificar</span>
                </label>
                <textarea id="descripcion" class="textarea" rows="5"
                    placeholder="Describe el problema con el mayor detalle posible..." maxlength="2000"></textarea>
                <div class="textarea-footer">
                    <span id="char-count" class="char-count">0 / 2000</span>
                </div>
            </div>

            <div class="actions">
                <button id="btn-clasificar" class="btn-primary">
                    <span class="btn-text">Clasificar Ticket</span>
                </button>
                <button id="btn-limpiar" class="btn-secondary">Nuevo Ticket</button>
            </div>
        </div>

        <section id="resultado" class="resultado hidden" aria-live="polite">
            <div class="resultado-meta">
                <span id="resultado-ticket-id" class="resultado-ticket-id"></span>
                <span class="resultado-label">Categoría predicha</span>
            </div>
            <div id="categoria" class="resultado-valor"></div>
        </section>

        <section id="error" class="error hidden" aria-live="assertive">
            <span id="error-msg"></span>
        </section>

    </main>

    <footer class="site-footer">
        <span>Proyecto IA</span>
        <span class="sep">-</span>
        <span>Christopher Yuman - Susana García - Erick Rivas</span>
        <span class="sep">-</span>
        <span>2026</span>
    </footer>

    <script src="/static/js/app.js"></script>
</body>

</html>
